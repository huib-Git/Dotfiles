# ==============================
# AeroSpace Hybrid Config
# Workflow v2 + Workspaces 1–7
# With Main / Secondary Monitor Mapping
# ==============================

start-at-login = true

after-startup-command = [
  'exec-and-forget borders active_color=0x66808080 inactive_color=0x00000000 width=6.0 style=round',
  'workspace 2',
  'layout accordion horizontal',
  'workspace 1',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

exec-on-workspace-change = [
  '/bin/bash', '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

[key-mapping]
preset = 'qwerty'

# ==============================
# GAPS
# ==============================

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = [{ monitor.main = 0 }, { monitor."2" = 2 }, 10]
outer.bottom = [{ monitor.main = 0 }, { monitor."2" = 2 }, 10]
outer.top = [{ monitor.main = 11 }, { monitor."2" = 47}, 10]
outer.right = [{ monitor.main = 0 }, { monitor."2" = 2 }, 105]

# ==============================
# MAIN MODE
# ==============================

[mode.main.binding]

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layout toggle
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Workspaces 1–7
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'

alt-tab = 'workspace-back-and-forth'
alt-shift-semicolon = 'mode service'

# ==============================
# SERVICE MODE
# ==============================

[mode.service.binding]

esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

shift-h = ['join-with left', 'mode main']
shift-j = ['join-with down', 'mode main']
shift-k = ['join-with up', 'mode main']
shift-l = ['join-with right', 'mode main']

# ==============================
# MONITOR ASSIGNMENT (FROM CONFIG 1)
# ==============================

[workspace-to-monitor-force-assignment]
1 = 'secondary'
2 = 'secondary'
3 = 'secondary'
4 = 'secondary'
5 = 'main'
6 = 'main'
7 = 'main'

# ==============================
# APP AUTOMATION
# ==============================

# Development → Workspace 1
[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['layout tiling', 'move-node-to-workspace 1']

# Browsing → Workspace 2
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['layout tiling', 'move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['layout tiling', 'move-node-to-workspace 2']

# Communication → Workspace 3
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = ['layout tiling', 'move-node-to-workspace 3']

# Planning → Workspace 4
[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = ['layout tiling', 'move-node-to-workspace 4']

# Music → Workspace 5
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['layout tiling', 'move-node-to-workspace 5']

# System → Workspace 6
[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout tiling', 'move-node-to-workspace 6']

# Extra → Workspace 7
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout tiling', 'move-node-to-workspace 7']
